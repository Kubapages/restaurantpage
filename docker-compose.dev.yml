version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: restaurant_db_dev
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_pass
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend_dev
    environment:
      DATABASE_URL: postgresql://restaurant_user:restaurant_pass@db:5432/restaurant_db
      SECRET_KEY: dev-secret-key-not-for-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    container_name: restaurant_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data_dev:
